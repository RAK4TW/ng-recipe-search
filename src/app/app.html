<div class="p-4 bg-black min-h-screen" style="font-family: 'Space Grotesk', sans-serif;">
  <div class="m-2 p-4 bg-linear-to-r from-yellow-400 to-red-500 text-gray-800 max-w-200 mx-auto rounded-md">
    <div class="flex items-center justify-between pb-2 border-b-2">
      <a [routerLink]="['recipes']" class="text-3xl font-extrabold"
        style="font-family: 'Bebas Neue', cursive;">{{title()}}</a>
      <a [routerLink]="['recipes/add']"
        class="cursor-pointer bg-white hover:bg-red-500 hover:text-white hover:border-black rounded-full text-black font-bold py-2 px-4 border border-red-500 transition-colors duration-200">Add
        Recipe</a>
    </div>
    <router-outlet class="m-4"/>
  </div>
</div>
