<div class="m-2">
  <h1>{{title()}}</h1>
  <p>{{recipe().name}}</p>
  <p>{{recipe().description}}</p>
  <div>
    <img [src]="recipe().imgUrl" [alt]="recipe().name + 'image'"/>
  </div>
  <p>Servings: {{servings()}}</p>
  <div>
    <p>Ingredients:</p>
    <ul>
      @for (item of adjustedIngredients(); track item.name) {
      <li>{{ item.name }} - quantity: {{item.quantity}} unit: {{item.unit}}</li>
      } 
  
  </ul>
  </div>
  <div class="mb-2">
    <button class="mr-2 bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
      (click)="prevRecipe()">Previous
      Recipe</button>
    <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" (click)="nextRecipe()">Next
      Recipe</button>
  </div>
  <div>
    <button class="mr-2 bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
      (click)="servingsLess()">Servings -</button>
    <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
      (click)="servingsMore()">Servings +</button>
  </div>
</div>
