<div>
    <div class="flex gap-2 items-center">
        <h2 class="text-2xl font-bold">{{recipe()?.name}}</h2>
        @if (recipe()?.isFavorite) {
        <button (click)="toggleFavorite()" 
            class="group cursor-pointer bg-red-500 text-gray-800 px-2 py-0.5 rounded-full text-xs font-bold shadow-md drop-shadow-lg transition-colors duration-200">
            <span class="group-hover:hidden">★ Favorite</span>
            <span class="hidden group-hover:inline">★ Remove from Favorites</span>
        </button>
        } @else {
        <button (click)="toggleFavorite()" 
            class="cursor-pointer bg-gray-300 text-gray-600 px-2 py-0.5 rounded-full text-xs font-bold shadow-md drop-shadow-lg transition-colors duration-200 hover:bg-red-500 hover:text-gray-800">☆
            Add to Favorites</button>
        }
    </div>
    <div>
        <h3 class="pb-4 text-sm italic">{{recipe()?.description}}</h3>
    </div>
    <div class="mt-4 mb-2 flex flex-col md:flex-row gap-2">
        <div class="flex gap-2">
            <button
                class="cursor-pointer mr-2 bg-white hover:bg-red-500 hover:text-white hover:border-black text-black font-bold py-2 px-4 rounded-full border border-red-500"
                (click)="servingsLess()">Servings -</button>
            <button
                class="cursor-pointer bg-white hover:bg-red-500 hover:text-white hover:border-black text-black font-bold py-2 px-4 rounded-full border border-red-500"
                (click)="servingsMore()">Servings +</button>
        </div>
    </div>
    <div class="flex flex-col md:flex-row gap-2">
        <div
            class="md:w-[50%] border rounded-lg my-1 md:my-2 p-3 bg-linear-to-br from-yellow-400 to-red-500 shadow transform hover:scale-102 transition-transform duration-200 h-full">
            <p class="text-sm mb-2 text-gray-800 font-bold tracking-wide">Ingredients: (Servings: {{servings()}})
            </p>
            <div class="flex flex-col gap-1">
                @for (item of adjustedIngredients(); track item.name) {
                <div
                    class="bg-white/20 backdrop-blur-sm rounded p-1 border border-white/30 hover:bg-white/25 transition-all duration-200">
                    <div class="flex items-center justify-between">
                        <strong class="text-gray-800 font-bold text-sm">{{ item.name }}</strong>
                        <div class="flex gap-2">
                            <span
                                class="bg-white text-red-500 px-2 py-0.5 rounded-full text-xs font-bold">{{item.quantity}}</span>
                            <span
                                class="bg-white/90 text-yellow-600 px-2 py-0.5 rounded-full text-xs font-bold">{{item.unit}}</span>
                        </div>
                    </div>
                </div>
                }
            </div>
        </div>
        <img class="md:w-[50%] border rounded-lg md:my-2 bg-yellow-100 h-full object-cover" [src]="recipe()?.imgUrl"
            [alt]="recipe()?.name + 'image'" />
    </div>

    <div class="py-2">
    <div class="flex flex-col md:flex-row gap-3 items-center justify-end">
        <div class="flex gap-2 w-full md:w-auto">
            <button
                class="flex-1 md:flex-none cursor-pointer bg-white hover:bg-red-500 hover:text-white hover:border-black rounded-full text-black font-bold py-2 px-4 border border-red-500 transition-colors duration-200"
                (click)="prevRecipe()"
                >Previous</button>
            <button
                class="flex-1 md:flex-none cursor-pointer bg-white hover:bg-red-500 hover:text-white hover:border-black rounded-full text-black font-bold py-2 px-4 border border-red-500 transition-colors duration-200"
                (click)="nextRecipe()">Next</button>
        </div>
    </div>
</div>
</div>
