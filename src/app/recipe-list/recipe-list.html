<div class="flex p-2 gap-2 items-center">
    <a [routerLink]="['/recipes', recipe().id]" class="text-2xl font-bold">{{recipe().name}}</a>
    @if (recipe().isFavorite) {
    <span class="bg-red-500 text-gray-800 px-2 py-0.5 rounded-full text-xs font-bold shadow-md drop-shadow-lg">★
        Favorite</span>
    }
</div>
<div><h3 class="pl-2 pr-2 pb-6 text-sm italic">{{recipe().description}}</h3></div>
<div class="p-2 -mt-2">
    <div class="flex flex-col md:flex-row gap-3 items-center">
        <div class="flex-1 w-full">
            <input [(ngModel)]="searchTerm" placeholder="Search recipes..."
                class="w-full px-4 py-2 rounded-full border border-red-500 bg-white text-black placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-500/20 transition-all duration-200" />
        </div>
    </div>
</div>
