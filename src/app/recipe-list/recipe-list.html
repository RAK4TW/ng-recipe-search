<app-recipe-detail [recipe]="recipe()" />
<div class="p-2 -mt-2">
    <button class="mr-2 bg-white hover:bg-gray-800 rounded-full text-black font-bold py-2 px-4 rounded border border-black"
        (click)="prevRecipe()">Previous
        Recipe</button>
    <button class="mr-2 bg-white hover:bg-gray-800 rounded-full text-black font-bold py-2 px-4 rounded border border-black"
    (click)="nextRecipe()">Next
        Recipe</button>
</div>
